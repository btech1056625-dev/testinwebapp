<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhavya Varshney - Developer Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --secondary: #ec4899;
            --bg-dark: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(236, 72, 153, 0.15) 0%, transparent 50%);
            overflow-x: hidden;
        }

        .container {
            width: 90%;
            max-width: 800px;
            padding: 2rem;
        }

        .profile-card {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
            animation: slideUp 0.8s ease-out;
        }

        .profile-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .avatar-placeholder {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: 800;
            color: white;
            box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.4);
            animation: pulse 3s infinite;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-muted);
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .college-info {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(99, 102, 241, 0.1);
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            margin-top: 1rem;
            border: 1px solid rgba(99, 102, 241, 0.2);
            font-size: 0.9rem;
            color: var(--primary-light);
        }

        .social-links {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .social-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: all 0.3s ease;
            text-decoration: none;
            color: var(--text-main);
            position: relative;
            overflow: hidden;
        }

        .social-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.3);
        }

        .social-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.05), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s ease;
        }

        .social-card:hover::after {
            transform: translateX(100%);
        }

        .icon-wrapper {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .github .icon-wrapper { background: #24292e; color: white; }
        .codeforces .icon-wrapper { background: #fff; color: #1f8acb; }
        .leetcode .icon-wrapper { background: #282828; color: #ffa116; }
        .hackerrank .icon-wrapper { background: #2ec866; color: white; }

        .social-info {
            display: flex;
            flex-direction: column;
        }

        .platform-name {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .username {
            font-size: 1.1rem;
            font-weight: 600;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(99, 102, 241, 0); }
            100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); }
        }

        @media (max-width: 600px) {
            .profile-card { padding: 2rem 1.5rem; }
            h1 { font-size: 2rem; }
            .social-links { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile-card">
            <div class="header">
                <div class="avatar-placeholder">BV</div>
                <h1>Bhavya Varshney</h1>
                <div class="subtitle">Computer Science Engineering (CSE)</div>
                <div class="college-info">
                    <i class="fa-solid fa-graduation-cap"></i>
                    BIT Mesra
                </div>
            </div>

            <div class="social-links">
                <a href="https://github.com/btech1056625-dev" target="_blank" class="social-card github">
                    <div class="icon-wrapper">
                        <i class="fa-brands fa-github"></i>
                    </div>
                    <div class="social-info">
                        <span class="platform-name">GitHub</span>
                        <span class="username">btech1056625-dev</span>
                    </div>
                </a>

                <a href="https://codeforces.com/profile/10566.25" target="_blank" class="social-card codeforces">
                    <div class="icon-wrapper">
                        <i class="fa-solid fa-chart-line"></i>
                    </div>
                    <div class="social-info">
                        <span class="platform-name">Codeforces</span>
                        <span class="username">10566.25</span>
                    </div>
                </a>

                <a href="https://leetcode.com/btech1056625/" target="_blank" class="social-card leetcode">
                    <div class="icon-wrapper">
                        <i class="fa-solid fa-code"></i>
                    </div>
                    <div class="social-info">
                        <span class="platform-name">LeetCode</span>
                        <span class="username">btech1056625</span>
                    </div>
                </a>

                <a href="https://www.hackerrank.com/btech10566_25" target="_blank" class="social-card hackerrank">
                    <div class="icon-wrapper">
                        <i class="fa-brands fa-hackerrank"></i>
                    </div>
                    <div class="social-info">
                        <span class="platform-name">HackerRank</span>
                        <span class="username">btech10566_25</span>
                    </div>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
