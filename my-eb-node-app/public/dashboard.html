<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Notes App</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --secondary: #ec4899;
            --bg-dark: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.8);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --input-bg: rgba(15, 23, 42, 0.6);
            --input-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image:
                radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(236, 72, 153, 0.15) 0%, transparent 50%);
            background-attachment: fixed;
        }

        /* Navbar Layout */
        .navbar {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
        }

        .brand i {
            color: var(--primary-light);
            font-size: 1.25rem;
            -webkit-text-fill-color: initial;
        }

        .btn-logout {
            padding: 0.6rem 1.2rem;
            background: rgba(236, 72, 153, 0.1);
            color: var(--secondary);
            border: 1px solid rgba(236, 72, 153, 0.3);
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-logout:hover {
            background: var(--secondary);
            color: white;
            box-shadow: 0 5px 15px -5px rgba(236, 72, 153, 0.5);
        }

        /* Main Dashboard Area */
        .main-content {
            flex: 1;
            width: 90%;
            max-width: 1000px;
            margin: 2.5rem auto;
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
        }

        /* Create Note Section */
        .create-note {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.6s ease-out;
        }

        .create-note form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .create-note textarea {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 12px;
            padding: 1.2rem;
            color: var(--text-main);
            font-family: inherit;
            font-size: 1.05rem;
            resize: vertical;
            min-height: 120px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .create-note textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        .create-note-footer {
            display: flex;
            justify-content: flex-end;
        }

        .btn-primary {
            padding: 0.8rem 1.5rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.95rem;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(99, 102, 241, 0.6);
        }

        /* Notes Display Section */
        .section-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .note-card {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s, box-shadow 0.3s;
            animation: slideUp 0.6s ease-out backwards;
        }

        .note-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .note-content {
            color: var(--text-main);
            line-height: 1.6;
            margin-bottom: 1.5rem;
            white-space: pre-wrap;
            flex-grow: 1;
            font-size: 0.95rem;
        }

        .note-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            color: var(--text-muted);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 1rem;
            margin-top: auto;
        }

        .btn-delete {
            background: transparent;
            border: none;
            color: rgba(236, 72, 153, 0.6);
            cursor: pointer;
            transition: color 0.3s, transform 0.2s;
            font-size: 1rem;
        }

        .btn-delete:hover {
            color: var(--secondary);
            transform: scale(1.1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 600px) {
            .navbar {
                flex-direction: column;
                gap: 1rem;
                padding: 1rem;
            }

            .create-note {
                padding: 1rem;
            }

            .notes-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar">
        <a href="/dashboard" class="brand">
            <i class="fa-solid fa-book-open"></i>
            NotesApp
        </a>
        <a href="/logout" class="btn-logout">
            <i class="fa-solid fa-arrow-right-from-bracket"></i> Logout
        </a>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Add Note Form -->
        <section class="create-note">
            <form id="noteForm">
                <textarea id="noteText"></textarea>
                <button type="submit">Add Note</button>
            </form>
        </section>

        <!-- Notes Grid -->
        <section>
            <h2 class="section-title"><i class="fa-regular fa-clipboard"></i> Your Notes</h2>
            <div class="notes-grid" id="notesGrid">
                <!-- Example Mock Note -->
                <div class="note-card">
                    <div class="note-content">Welcome to your new notes app! You can add new notes above, and they will
                        appear here. The design follows modern aesthetics with dark mode, glassmorphism, and sleek
                        gradients.</div>
                    <div class="note-meta">
                        <span>Just now</span>
                        <button class="btn-delete" title="Delete Note" onclick="this.closest('.note-card').remove()">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="/script.js"></script>
</body>

</html>
